name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: |
          shellcheck \
            .claude/hooks/*.sh \
            .codex/hooks/*.sh \
            .agent-md/bin/*.sh \
            .githooks/pre-commit

  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON and synced agent files
        run: |
          python3 -m json.tool .claude/settings.json >/dev/null
          python3 -m json.tool .codex/hooks.json >/dev/null
          # AGENT.md is the source of truth; the shipped copies must match it.
          cmp AGENT.md CLAUDE.md
          cmp AGENT.md AGENTS.md
          diff <(tail -n +5 .cursor/rules/agent-md.mdc) AGENT.md
          diff <(tail -n +5 .windsurf/rules/agent-md.md) AGENT.md
          ! git grep -n -E 'Archimedes|Aider|claude-md|CONVENTIONS|cursorrules|windsurfrules|CRISPY' -- . ':!.github/workflows/ci.yml'

  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats jq
      - name: Run bats suite
        run: bats tests/
